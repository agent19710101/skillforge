services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:10
    container_name: skillforge-forgejo
    restart: unless-stopped
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__server__ROOT_URL: http://localhost:3000/
      FORGEJO__server__HTTP_PORT: "3000"
      FORGEJO__database__DB_TYPE: sqlite3
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - forgejo-data:/data

  skillforge-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skillforge-api
    restart: unless-stopped
    depends_on:
      - forgejo
    environment:
      SKILLFORGE_LISTEN_ADDR: :8080
      SKILLFORGE_REPO_ROOT: /data/skills-repo
      # Optional live submission settings. Enable these only when
      # SKILLFORGE_REPO_ROOT points at a writable checked-out clone of the
      # canonical Forgejo repository instead of the read-only sample repo.
      # SKILLFORGE_FORGEJO_SERVER_URL: http://forgejo:3000
      # SKILLFORGE_FORGEJO_REMOTE_NAME: origin
      # SKILLFORGE_FORGEJO_OWNER: your-org
      # SKILLFORGE_FORGEJO_REPO: skills
      # SKILLFORGE_FORGEJO_BASE_BRANCH: main
      # SKILLFORGE_FORGEJO_TOKEN: replace-me
      # SKILLFORGE_FORGEJO_AUTH_METHOD: token
    ports:
      - "8080:8080"
    volumes:
      - ./dev/sample-skills-repo:/data/skills-repo:ro
      # For live submission, replace the read-only sample mount above with a
      # writable managed working copy of the canonical repository.
      # - ./dev/skills-repo:/data/skills-repo

volumes:
  forgejo-data:
